<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloStrap | Official Launcher</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Sunset lofi chill background with a dark overlay */
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1558486012-817176f84c6d?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden; 
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 3.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            max-width: 800px;
            width: 90%;
            z-index: 10;
        }

        .eyebrow {
            font-size: 0.9rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -2px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .desc {
            font-size: 1.15rem;
            color: #e2e8f0;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }

        .btn-main {
            background: #c7d2fe;
            color: #1e1b4b;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(199, 210, 254, 0.4);
            width: 100%;
        }

        .btn-main:hover {
            background: #e0e7ff;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(199, 210, 254, 0.6);
        }

        .slogan {
            margin-top: 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #a5b4fc;
            background: rgba(0, 0, 0, 0.4);
            padding: 0.6rem 2rem;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .manual-link {
            display: block;
            margin-top: 1.5rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .manual-link:hover {
            color: #ffffff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <p class="eyebrow">Official Launcher Download</p>
        <h1>VeloStrap</h1>
        <p class="desc">Get the newest VeloStrap release instantly. If your browser blocks the direct file, use the manual download below.</p>
        
        <div class="btn-group">
            <button class="btn-main" id="downloadBtn">Download VeloStrap</button>
            
            <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/2L6jQW8ZJptC2plbYJlgtJ?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
        
        <p class="slogan">VeloStrap: All Gas, No Bloat.</p>

        <a href="https://newpythonx.itch.io/velo-strap" class="manual-link" target="_blank">Manual Itch.io Download</a>
    </div>

    <script>
        // --- GITHUB API DOWNLOAD LOGIC ---
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const btn = document.getElementById('downloadBtn');
            const originalText = btn.innerText;
            btn.innerText = "Fetching Latest...";
            
            try {
                const response = await fetch('https://api.github.com/repos/NewPythonX-NPX/VeloStrap/releases/latest');
                const data = await response.json();
                
                if (data.assets && data.assets.length > 0) {
                    window.location.href = data.assets[0].browser_download_url;
                } else {
                    window.location.href = data.html_url || 'https://github.com/NewPythonX-NPX/VeloStrap/releases';
                }
            } catch (error) {
                console.error("Error fetching from GitHub:", error);
                window.location.href = 'https://github.com/NewPythonX-NPX/VeloStrap/releases';
            }
            
            setTimeout(() => {
                btn.innerText = originalText;
            }, 2000);
        });
    </script>
</body>
</html>
